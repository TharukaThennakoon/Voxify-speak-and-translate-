<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxify – Speak &amp; Translate</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- App header -->
      <header class="app-header">
        <h1>🔊 Voxify</h1>
        <p class="subtitle">Speak &amp; Translate</p>
      </header>

      <!-- Main card -->
      <main class="card">
        <!-- Text input -->
        <div class="form-group">
          <label for="text-input">Enter text</label>
          <textarea
            id="text-input"
            rows="5"
            placeholder="Type something to speak or translate…"
          ></textarea>
          <p id="error-msg" class="error-msg" aria-live="polite"></p>
        </div>

        <!-- Language selection -->
        <div class="form-group">
          <label for="language-select">Target language</label>
          <select id="language-select">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
            <option value="ru">Russian</option>
          </select>
        </div>

        <!-- Voice selection -->
        <div class="form-group">
          <label for="voice-select">Voice</label>
          <select id="voice-select">
            <option value="">— Default voice —</option>
          </select>
        </div>

        <!-- Speech rate -->
        <div class="form-group slider-group">
          <label for="rate-input">
            Speech rate: <span id="rate-value">1</span>
          </label>
          <input
            type="range"
            id="rate-input"
            min="0.5"
            max="2"
            step="0.1"
            value="1"
          />
        </div>

        <!-- Pitch -->
        <div class="form-group slider-group">
          <label for="pitch-input">
            Pitch: <span id="pitch-value">1</span>
          </label>
          <input
            type="range"
            id="pitch-input"
            min="0"
            max="2"
            step="0.1"
            value="1"
          />
        </div>

        <!-- Action buttons -->
        <div class="btn-group">
          <button id="speak-btn" class="btn btn-primary">🔊 Speak</button>
          <button id="translate-btn" class="btn btn-secondary">
            🌐 Translate &amp; Speak
          </button>
          <button id="stop-btn" class="btn btn-danger">⏹ Stop</button>
        </div>

        <!-- Status / translation preview -->
        <div id="status-box" class="status-box" aria-live="polite"></div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
